<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리가족 용돈기입장</title>
    
    <!-- 1. 디자인을 예쁘게 해주는 도구 (Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. 리액트 번역기 도구들 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 3. 파이어베이스 도구들 -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100">
    <!-- 앱이 그려질 도화지 -->
    <div id="root"></div>

    <!-- 여기서부터 실제 앱을 만드는 리액트 코드입니다 -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // =====================================================================
        // ⭐ 중요: 파이어베이스 설정! ⭐
        // 파이어베이스 콘솔에서 본인의 firebaseConfig 내용으로 아래 부분을 교체하세요.
        // 교체하지 않으면 임시로 내 폰에서만 저장되는 '로컬 모드'로 작동합니다.
        // =====================================================================
        const firebaseConfig = {
            // apiKey: "AIzaSyB...",
            // authDomain: "...",
            // projectId: "...",
            // 등등... 본인의 코드로 채워주세요!
        };

        // 파이어베이스 연결 시도
        let db = null;
        let isFirebaseActive = false;
        if (Object.keys(firebaseConfig).length > 0) {
            try {
                const app = firebase.initializeApp(firebaseConfig);
                db = firebase.firestore(app);
                isFirebaseActive = true;
                console.log("파이어베이스 연결 성공!");
            } catch (e) {
                console.error("파이어베이스 연결 실패:", e);
            }
        }

        // --- 아이콘 컴포넌트들 (직접 그린 아이콘) ---
        const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>;
        const IconMinus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
        const IconBack = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;

        function App() {
            const [role, setRole] = useState(null);
            const [transactions, setTransactions] = useState([]);
            const [showInputForm, setShowInputForm] = useState(false);
            const [inputType, setInputType] = useState('expense');
            const [amount, setAmount] = useState('');
            const [description, setDescription] = useState('');

            // 데이터 불러오기 (파이어베이스가 연결되었으면 클라우드에서, 아니면 내 폰에서)
            useEffect(() => {
                if (isFirebaseActive && db) {
                    // 파이어베이스 실시간 연동
                    const unsubscribe = db.collection('allowance_records').onSnapshot((snapshot) => {
                        const records = [];
                        snapshot.forEach((doc) => {
                            records.push({ id: doc.id, ...doc.data() });
                        });
                        records.sort((a, b) => b.timestamp - a.timestamp);
                        setTransactions(records);
                    });
                    return () => unsubscribe();
                } else {
                    // 로컬 임시 연동 (파이어베이스 설정 전 테스트용)
                    const saved = localStorage.getItem('local_allowance');
                    if (saved) setTransactions(JSON.parse(saved));
                }
            }, []);

            // 데이터 저장하기
            const handleAddTransaction = (e) => {
                e.preventDefault();
                if (!amount || !description) return;
                const numAmount = parseInt(amount, 10);
                if (isNaN(numAmount) || numAmount <= 0) return;

                const newRecord = {
                    type: inputType,
                    amount: numAmount,
                    description: description,
                    timestamp: Date.now(),
                    writer: role
                };

                if (isFirebaseActive && db) {
                    // 클라우드에 저장
                    db.collection('allowance_records').add(newRecord).then(() => {
                        setAmount(''); setDescription(''); setShowInputForm(false);
                    });
                } else {
                    // 내 폰에 임시 저장
                    const updated = [{ id: Date.now().toString(), ...newRecord }, ...transactions];
                    setTransactions(updated);
                    localStorage.setItem('local_allowance', JSON.stringify(updated));
                    setAmount(''); setDescription(''); setShowInputForm(false);
                }
            };

            // 데이터 삭제하기
            const handleDelete = (id) => {
                if (isFirebaseActive && db) {
                    db.collection('allowance_records').doc(id).delete();
                } else {
                    const updated = transactions.filter(t => t.id !== id);
                    setTransactions(updated);
                    localStorage.setItem('local_allowance', JSON.stringify(updated));
                }
            };

            // 계산 로직
            const currentBalance = transactions.reduce((acc, curr) => curr.type === 'income' ? acc + curr.amount : acc - curr.amount, 0);
            const earnedStickers = Math.floor(transactions.length / 3);

            const getLevelInfo = (balance) => {
                if (balance >= 10000) return { icon: '🐔', title: '황금 용돈닭', color: 'bg-yellow-100 text-yellow-800', desc: '용돈 마스터! 대단해요!' };
                if (balance >= 5000) return { icon: '🐥', title: '저축 병아리', color: 'bg-green-100 text-green-800', desc: '무럭무럭 돈이 모여요!' };
                return { icon: '🥚', title: '알뜰 초보', color: 'bg-gray-100 text-gray-800', desc: '조금씩 아껴보아요!' };
            };
            const levelInfo = getLevelInfo(currentBalance);

            // 1. 역할 선택 화면
            if (!role) {
                return (
                    <div className="flex flex-col h-screen max-w-md mx-auto bg-yellow-50 items-center justify-center p-6 shadow-lg relative">
                        {!isFirebaseActive && (
                            <div className="absolute top-4 w-full px-6">
                                <div className="bg-red-100 text-red-600 p-3 rounded-lg text-sm text-center font-bold">
                                    ⚠️ 현재 파이어베이스가 연결되지 않았습니다.<br/>테스트용으로 내 폰에만 저장됩니다.
                                </div>
                            </div>
                        )}
                        <div className="bg-white p-8 rounded-2xl shadow-md w-full text-center space-y-8">
                            <div>
                                <h1 className="text-3xl font-extrabold text-gray-800 mb-2">용돈기입장</h1>
                                <p className="text-gray-500">누가 사용하고 있나요?</p>
                            </div>
                            <div className="space-y-4">
                                <button onClick={() => setRole('child')} className="w-full flex items-center justify-center space-x-3 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-4 px-6 rounded-xl transition shadow-sm">
                                    <IconUser /> <span className="text-lg">나는 아이예요</span>
                                </button>
                                <button onClick={() => setRole('parent')} className="w-full flex items-center justify-center space-x-3 bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-6 rounded-xl transition shadow-sm">
                                    <IconUsers /> <span className="text-lg">나는 부모예요</span>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // 2. 입력 폼 화면
            if (showInputForm) {
                return (
                    <div className="flex flex-col h-screen max-w-md mx-auto bg-gray-50 shadow-lg">
                        <div className="p-4 bg-white flex items-center shadow-sm">
                            <button onClick={() => setShowInputForm(false)} className="p-2 text-gray-600 hover:bg-gray-100 rounded-full"><IconBack /></button>
                            <h2 className="text-xl font-bold ml-2 text-gray-800">{inputType === 'income' ? '용돈 받았어요!' : '돈을 썼어요!'}</h2>
                        </div>
                        <form onSubmit={handleAddTransaction} className="p-6 flex-1 space-y-6">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">얼마를 {inputType === 'income' ? '받았나요?' : '썼나요?'}</label>
                                <div className="relative">
                                    <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="예: 1500" className="w-full text-2xl font-bold p-4 border-2 border-gray-200 rounded-xl focus:border-yellow-400 focus:outline-none" autoFocus />
                                    <span className="absolute right-4 top-4 text-xl text-gray-500 font-bold">원</span>
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">어디에 {inputType === 'income' ? '받았나요?' : '썼나요?'}</label>
                                <input type="text" value={description} onChange={(e) => setDescription(e.target.value)} placeholder={inputType === 'income' ? "예: 심부름 용돈" : "예: 아이스크림"} className="w-full text-lg p-4 border-2 border-gray-200 rounded-xl focus:border-yellow-400 focus:outline-none" />
                            </div>
                            <button type="submit" className={`w-full font-bold py-4 rounded-xl text-lg shadow-md transition ${inputType === 'income' ? 'bg-blue-500 text-white' : 'bg-red-500 text-white'}`}>
                                저장하기
                            </button>
                        </form>
                    </div>
                );
            }

            // 3. 메인 화면
            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-gray-50 shadow-lg relative overflow-hidden">
                    <div className={`p-4 flex justify-between items-center text-white shadow-md z-20 ${role === 'child' ? 'bg-yellow-500' : 'bg-blue-600'}`}>
                        <div className="flex items-center space-x-2">
                            {role === 'child' ? <IconUser /> : <IconUsers />}
                            <span className="font-bold text-lg">{role === 'child' ? '내 용돈기입장' : '우리아이 용돈 확인'}</span>
                        </div>
                        <button onClick={() => setRole(null)} className="text-sm bg-white/20 px-3 py-1 rounded-full hover:bg-white/30 transition">역할 바꾸기</button>
                    </div>

                    <div className="bg-white rounded-b-3xl shadow-sm z-10 p-6 pt-4 space-y-4">
                        <div className="flex items-center justify-between bg-gray-50 p-4 rounded-2xl border border-gray-100">
                            <div className="flex items-center space-x-4">
                                <div className="text-4xl bg-white p-2 rounded-full shadow-sm">{levelInfo.icon}</div>
                                <div>
                                    <span className={`text-xs font-bold px-2 py-1 rounded-md mb-1 inline-block ${levelInfo.color}`}>
                                        Lv.{levelInfo.icon === '🥚' ? '1' : levelInfo.icon === '🐥' ? '2' : '3'} 타이틀
                                    </span>
                                    <p className="font-extrabold text-gray-800 text-lg">{levelInfo.title}</p>
                                    <p className="text-xs text-gray-500">{levelInfo.desc}</p>
                                </div>
                            </div>
                            <div className="text-right">
                                <div className="flex items-center justify-end text-yellow-500 mb-1">
                                    <span className="text-lg">⭐</span>
                                    <span className="font-bold ml-1">{earnedStickers}개</span>
                                </div>
                                <p className="text-[10px] text-gray-400">기록 칭찬별</p>
                            </div>
                        </div>

                        <div>
                            <p className="text-gray-500 font-medium text-sm mb-1">현재 남은 돈</p>
                            <div className="flex items-end space-x-1">
                                <span className="text-4xl font-extrabold text-gray-800">{currentBalance.toLocaleString()}</span>
                                <span className="text-xl font-bold text-gray-600 mb-1">원</span>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-3 pb-24">
                        {transactions.length === 0 ? (
                            <div className="text-center text-gray-400 mt-10">
                                <p className="text-4xl mb-2">👛</p>
                                <p>아직 적힌 내역이 없어요!</p>
                                <p className="text-sm mt-2 text-yellow-500">3번 기록하면 칭찬별을 받아요!</p>
                            </div>
                        ) : (
                            transactions.map((tx) => {
                                const date = new Date(tx.timestamp);
                                const dateString = `${date.getMonth() + 1}월 ${date.getDate()}일`;
                                return (
                                    <div key={tx.id} className="bg-white p-4 rounded-xl shadow-sm flex items-center justify-between border border-gray-100">
                                        <div className="flex items-center space-x-4">
                                            <div className={`p-3 rounded-full ${tx.type === 'income' ? 'bg-blue-100 text-blue-600' : 'bg-red-100 text-red-500'}`}>
                                                {tx.type === 'income' ? <IconPlus /> : <IconMinus />}
                                            </div>
                                            <div>
                                                <p className="font-bold text-gray-800">{tx.description}</p>
                                                <p className="text-xs text-gray-400">{dateString} • {tx.writer === 'child' ? '아이가' : '부모가'} 적음</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center space-x-3">
                                            <span className={`font-bold text-lg ${tx.type === 'income' ? 'text-blue-600' : 'text-gray-800'}`}>
                                                {tx.type === 'income' ? '+' : '-'}{tx.amount.toLocaleString()}원
                                            </span>
                                            <button onClick={() => handleDelete(tx.id)} className="text-gray-300 hover:text-red-500 transition p-1"><IconTrash /></button>
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </div>

                    <div className="absolute bottom-0 w-full p-4 bg-white border-t border-gray-100 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20">
                        <div className="flex space-x-3">
                            {role === 'child' ? (
                                <>
                                    <button onClick={() => { setInputType('expense'); setShowInputForm(true); }} className="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-xl flex items-center justify-center space-x-2 shadow-md transition">
                                        <IconMinus /><span>돈 썼어요</span>
                                    </button>
                                    <button onClick={() => { setInputType('income'); setShowInputForm(true); }} className="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-xl flex items-center justify-center space-x-2 shadow-md transition">
                                        <IconPlus /><span>돈 받았어요</span>
                                    </button>
                                </>
                            ) : (
                                <button onClick={() => { setInputType('income'); setShowInputForm(true); }} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl flex items-center justify-center space-x-2 shadow-md transition">
                                    <IconPlus /><span>용돈 주기 (수입)</span>
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
